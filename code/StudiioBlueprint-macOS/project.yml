name: StudiioBlueprint
options:
  bundleIdPrefix: com.studiio
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  StudiioBlueprint:
    type: application
    platform: macOS
    sources:
      - path: StudiioBlueprint
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.studiio.blueprint
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "EX4VAF26CQ"
        INFOPLIST_FILE: StudiioBlueprint/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: complete
    entitlements:
      path: StudiioBlueprint/StudiioBlueprint.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true

  StudiioBlueprintTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: StudiioBlueprintTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: StudiioBlueprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.studiio.blueprint.tests
        DEVELOPMENT_TEAM: "EX4VAF26CQ"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
