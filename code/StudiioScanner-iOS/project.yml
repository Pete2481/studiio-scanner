name: StudiioScanner
options:
  bundleIdPrefix: com.studiio
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: StudiioScanner/Info.plist

targets:
  StudiioScanner:
    type: application
    platform: iOS
    sources:
      - path: StudiioScanner
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.studiio.scanner
        INFOPLIST_FILE: StudiioScanner/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: "97RBCCUY36"
        CODE_SIGN_STYLE: Automatic
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: StudiioScanner/StudiioScanner.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.studiio.scanner"
        com.apple.developer.icloud-services:
          - "CloudDocuments"

  StudiioScannerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StudiioScannerTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: StudiioScanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.studiio.scanner.tests
        DEVELOPMENT_TEAM: "97RBCCUY36"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
